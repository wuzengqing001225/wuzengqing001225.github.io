- date: "Jun. 2026"
  content: >-
    <a href="https://arxiv.org/abs/2606.00820">Not All Flips Are Conformity</a>: We find that answer flips in multi-agent LLM debate conflate self-reflection instability with peer influence; after decomposition, strict conformity is smaller, predominantly harmful, and partially predictable.

- date: "May. 2025"
  content: >-
